services:
  kdc-store:
    image: redis:7.2-alpine
    container_name: kdc-store
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - kerberos-net

  kdc-db:
    image: postgres:16-alpine
    container_name: kdc-db
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - kdc-db-data:/var/lib/postgresql/data
    networks:
      - kerberos-net

  kerberos-as:
    build:
      context: .
      dockerfile: docker/Dockerfile.jvm
    container_name: kerberos-as
    ports:
      - "8081:8080"
    environment:
      - QUARKUS_REDIS_HOSTS=redis://default:${REDIS_PASSWORD}@kdc-store:6379
      - KDC_MASTER_KEY=${KDC_MASTER_KEY}
      - APP_SERVICE_KEY=${APP_SERVICE_KEY}
      - MOCK_USER_NAME=${MOCK_USER_NAME}
      - MOCK_USER_KEY=${MOCK_USER_KEY}
      - PG_HOST=kdc-db
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE}
    depends_on:
      - kdc-store
      - kdc-db
    networks:
      - kerberos-net

  kerberos-tgs:
    build:
      context: .
      dockerfile: docker/Dockerfile.jvm
    container_name: kerberos-tgs
    ports:
      - "8082:8080"
    environment:
      - QUARKUS_REDIS_HOSTS=redis://default:${REDIS_PASSWORD}@kdc-store:6379
      - KDC_MASTER_KEY=${KDC_MASTER_KEY}
      - APP_SERVICE_KEY=${APP_SERVICE_KEY}
      - MOCK_USER_NAME=${MOCK_USER_NAME}
      - MOCK_USER_KEY=${MOCK_USER_KEY}
      - PG_HOST=kdc-db
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE}
    depends_on:
      - kdc-store
      - kdc-db
    networks:
      - kerberos-net

  app-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.jvm
    container_name: app-service
    ports:
      - "8083:8080"
    environment:
      - APP_SERVICE_KEY=${APP_SERVICE_KEY}
      - KDC_MASTER_KEY=${KDC_MASTER_KEY}
      - MOCK_USER_NAME=${MOCK_USER_NAME}
      - MOCK_USER_KEY=${MOCK_USER_KEY}
      - QUARKUS_REDIS_HOSTS=redis://default:${REDIS_PASSWORD}@kdc-store:6379
      - PG_HOST=kdc-db
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE}
    depends_on:
      - kdc-store
      - kdc-db
    networks:
      - kerberos-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - kerberos-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - kerberos-net

networks:
  kerberos-net:
    driver: bridge

volumes:
  kdc-db-data:
    driver: local
