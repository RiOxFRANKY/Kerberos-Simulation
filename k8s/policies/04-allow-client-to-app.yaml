apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-to-app-service
spec:
  # Target the App Service pods
  podSelector:
    matchLabels:
      app: app-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    # Only allow traffic originating from the 'client' namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: client
    ports:
    - protocol: TCP
      port: 8080
