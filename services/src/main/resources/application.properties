# Quarkus Application Properties for Kerberos Authentication Service (AS)

# Configure the Redis Client (overridden by QUARKUS_REDIS_HOSTS env var in Docker)
quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS:redis://localhost:6379}

# Expose Micrometer Metrics for Prometheus at /q/metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# PostgreSQL Datasource (KDC Principal Database)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${PG_USER:kdc_dev}
quarkus.datasource.password=${PG_PASSWORD:changeme}
quarkus.datasource.jdbc.url=jdbc:postgresql://${PG_HOST:localhost}:5432/${PG_DATABASE:kerberos_registry}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
